name: Build Companion Save Reader

on:
  push:
    tags:
      - 'companion-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish single-file self-contained
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Rename output
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^companion-v', ''
          Move-Item publish/P5RCompanion.exe "publish/P5RCompanion-$version.exe"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/companion-v')
        uses: softprops/action-gh-release@v2
        with:
          files: companion/publish/P5RCompanion-*.exe
          name: Save Reader ${{ github.ref_name }}
          body: |
            Companion save reader for P5R Fusion Planner.

            Download `P5RCompanion-*.exe`, run it, pick a save slot, click
            "Read Selected Save" then "Open in Browser" — the PWA will
            auto-import your owned personas.

            Web app: https://aemiliusxiv.github.io/P5RFusionCalc/

      - name: Upload as artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: P5RCompanion
          path: companion/publish/*.exe
