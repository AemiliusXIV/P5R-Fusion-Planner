name: Build Companion Save Reader

on:
  push:
    tags:
      - 'companion-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish single-file self-contained
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Rename output
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^companion-v', ''
          Move-Item publish/P5RCompanion.exe "publish/P5RCompanion-$version.exe"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/companion-v')
        uses: softprops/action-gh-release@v2
        with:
          files: companion/publish/P5RCompanion-*.exe
          name: Save Reader ${{ github.ref_name }}
          prerelease: true
          body: |
            > ⚠️ **EARLY TESTING BUILD — NOT RECOMMENDED FOR GENERAL USE**
            >
            > This is an early release of the save reader and has not been
            > tested against a wide range of real save files yet. Behaviour,
            > naming, and the deep-link format may change without notice in
            > future versions.
            >
            > **Use at your own risk.** The tool only ever reads your save
            > file (it never writes back), but bugs in parsing or in the
            > generated import data could result in incorrect owned-persona
            > state in the planner. Always export your existing owned data
            > from the planner before importing, so you can roll back.

            Companion save reader for the P5R Fusion Planner.

            **What it does:**
            1. Auto-detects your P5R PC save folder
            2. Pick a save slot, click *Read Selected Save*
            3. Click *Open in Browser* — the planner opens and imports
               your owned personas automatically

            **Privacy:**
            - Original save file is never opened with write access
            - No Steam ID required (static AES key)
            - Only the persona compendium is read (22 KB of the 256 KB save)
            - Protagonist name, playtime, items, money are not touched
            - The deep-link uses a URL hash, which browsers never send to servers

            Web app: https://aemiliusxiv.github.io/P5RFusionCalc/

      - name: Upload as artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: P5RCompanion
          path: companion/publish/*.exe
