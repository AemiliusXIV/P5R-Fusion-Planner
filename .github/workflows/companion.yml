name: Build Companion Save Reader

on:
  push:
    tags:
      - 'companion-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish single-file self-contained
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Rename output
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^companion-v', ''
          Move-Item publish/P5RCompanion.exe "publish/P5RCompanion-$version.exe"

      - name: Compute checksum
        id: hash
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^companion-v', ''
          $sha = (Get-FileHash "publish/P5RCompanion-$version.exe" -Algorithm SHA256).Hash.ToLower()
          "sha256=$sha" >> $env:GITHUB_OUTPUT

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/companion-v')
        uses: softprops/action-gh-release@v2
        with:
          files: companion/publish/P5RCompanion-*.exe
          name: Save Reader ${{ github.ref_name }}
          prerelease: false
          body: |
            Companion save reader for the [P5R Fusion Planner](https://aemiliusxiv.github.io/P5R-Fusion-Planner/).

            Reads your Persona 5 Royal PC save file and imports your owned personas
            into the planner automatically. No manual marking needed.

            **Quick start:**
            1. Run `P5RCompanion.exe`
            2. Your save folder is detected automatically
            3. Pick a save slot, click **Read Selected Save**
            4. Click **Open in Browser** to import, or **Copy Link** to paste manually

            For a full walkthrough, what data is read, a privacy breakdown, and security notes,
            see the [How it works](https://github.com/AemiliusXIV/P5R-Fusion-Planner/blob/master/docs/how-it-works.md) guide.

            On first run, Windows SmartScreen or your antivirus may prompt because the app isn't
            signed. It reads your save locally and makes no network connections; the guide above
            covers the detail. To proceed past SmartScreen: **More info → Run anyway**.

            ---

            **What's new:** see the [commit history](https://github.com/AemiliusXIV/P5R-Fusion-Planner/commits/${{ github.ref_name }}/companion) for the changes in this release.

            The companion is licensed under [GPL v3](https://github.com/AemiliusXIV/P5R-Fusion-Planner/blob/master/companion/LICENSE).

            ---

            Verify your download (optional). SHA-256: `${{ steps.hash.outputs.sha256 }}`

      - name: Upload as artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: P5RCompanion
          path: companion/publish/*.exe
