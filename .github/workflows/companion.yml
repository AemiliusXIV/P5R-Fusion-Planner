name: Build Companion Save Reader

on:
  push:
    tags:
      - 'companion-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: companion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Publish single-file self-contained
        run: >
          dotnet publish -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Rename output
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^companion-v', ''
          Move-Item publish/P5RCompanion.exe "publish/P5RCompanion-$version.exe"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/companion-v')
        uses: softprops/action-gh-release@v2
        with:
          files: companion/publish/P5RCompanion-*.exe
          name: Save Reader ${{ github.ref_name }}
          prerelease: false
          body: |
            Companion save reader for the [P5R Fusion Planner](https://aemiliusxiv.github.io/P5RFusionCalc/).

            Reads your Persona 5 Royal PC save file and imports your owned personas
            into the planner automatically. No manual marking needed.

            **Quick start:**
            1. Run `P5RCompanion.exe`
            2. Your save folder is detected automatically
            3. Pick a save slot, click **Read Selected Save**
            4. Click **Open in Browser** to import, or **Copy Link** to paste manually

            For a full walkthrough, details on what data is read, and a privacy breakdown,
            see the [How it works](https://github.com/AemiliusXIV/P5RFusionCalc/blob/master/docs/how-it-works.md) guide.

            ---

            **Security warnings on first launch**

            Windows SmartScreen or your antivirus may flag the file when you first run it.
            This is normal for any unsigned application downloaded from the internet — it is
            not a sign that something is wrong. The app reads your save file locally and does
            not connect to the internet, modify any files, or send data anywhere.
            If you want to check exactly what it does before running it, the full source is
            here in this repo and the [How it works](https://github.com/AemiliusXIV/P5RFusionCalc/blob/master/docs/how-it-works.md)
            guide covers it in plain language.

            To get past SmartScreen: click **More info** → **Run anyway**.

            ---

            **What's new in this release**

            - Fixed: previous release (v1.0.0) would silently fail to open on machines where
              the app was downloaded as a single file. WPF's native graphics libraries were not
              being bundled into the EXE — they are now.

      - name: Upload as artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: P5RCompanion
          path: companion/publish/*.exe
